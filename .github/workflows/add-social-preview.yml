name: Add social preview image

on:
  push:
    paths:
      - '.github/workflows/add-social-preview.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-social-preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install SVG renderer
        run: |
          sudo apt-get update
          sudo apt-get install -y librsvg2-bin

      - name: Create social preview artwork
        run: |
          mkdir -p assets
          cat > assets/build-with-ronald-social.svg <<'SVG'
          <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
            <defs>
              <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#08090c"/>
                <stop offset="1" stop-color="#101722"/>
              </linearGradient>
              <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#ff8a00"/>
                <stop offset="1" stop-color="#ff5a1f"/>
              </linearGradient>
              <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#29c4ff"/>
                <stop offset="1" stop-color="#0798e4"/>
              </linearGradient>
              <filter id="glow"><feGaussianBlur stdDeviation="18"/></filter>
            </defs>

            <rect width="1200" height="630" fill="url(#bg)"/>
            <circle cx="100" cy="550" r="170" fill="#ff5a1f" opacity=".12" filter="url(#glow)"/>
            <circle cx="1120" cy="90" r="180" fill="#29c4ff" opacity=".12" filter="url(#glow)"/>

            <g opacity=".18" stroke="#8b93a1" stroke-width="1">
              <path d="M0 80H1200M0 160H1200M0 240H1200M0 320H1200M0 400H1200M0 480H1200M0 560H1200"/>
              <path d="M80 0V630M160 0V630M240 0V630M320 0V630M400 0V630M480 0V630M560 0V630M640 0V630M720 0V630M800 0V630M880 0V630M960 0V630M1040 0V630M1120 0V630"/>
            </g>

            <g transform="translate(98 98)">
              <path d="M22 18H142C177 18 199 37 199 66C199 87 188 101 168 111C192 120 207 139 207 163C207 198 181 218 142 218H22V18ZM65 58V92H132C147 92 156 86 156 75C156 64 147 58 132 58H65ZM65 132V178H137C154 178 164 170 164 155C164 140 154 132 137 132H65Z" fill="url(#orange)" fill-rule="evenodd"/>
              <path d="M130 18H222C263 18 291 45 291 82C291 109 278 129 253 142L300 218H249L208 151H180V218H136V108H216C235 108 247 98 247 82C247 66 235 58 216 58H168L130 18Z" fill="url(#blue)"/>
            </g>

            <g font-family="Arial, Helvetica, sans-serif" font-weight="800" letter-spacing="5">
              <text x="430" y="205" font-size="72" fill="#ff5a1f">BUILD</text>
              <text x="690" y="205" font-size="72" fill="#f3f5f7">WITH</text>
              <text x="895" y="205" font-size="72" fill="#29c4ff">RONALD</text>
            </g>

            <line x1="100" y1="360" x2="1100" y2="360" stroke="url(#blue)" stroke-width="2" opacity=".7"/>
            <text x="600" y="440" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#e7e5de">Systems • Software • Business</text>
            <text x="600" y="500" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="27" fill="#8b93a1">Web platforms, automation tools &amp; digital experiences</text>
            <text x="600" y="565" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="700" fill="#29c4ff">buildwithronald.com</text>
          </svg>
          SVG

          rsvg-convert -w 1200 -h 630 assets/build-with-ronald-social.svg -o assets/build-with-ronald-social.png
          rsvg-convert -w 512 -h 512 assets/build-with-ronald-logo.svg -o assets/apple-touch-icon.png

      - name: Add social metadata
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          text = p.read_text()
          marker = '<meta name="viewport" content="width=device-width, initial-scale=1.0">'
          tags = '''<meta name="viewport" content="width=device-width, initial-scale=1.0">
          <meta name="description" content="Build With Ronald — websites, software systems, automation, and digital experiences.">
          <link rel="canonical" href="https://buildwithronald.com/">
          <link rel="apple-touch-icon" sizes="512x512" href="https://buildwithronald.com/assets/apple-touch-icon.png?v=2">
          <meta property="og:type" content="website">
          <meta property="og:site_name" content="Build With Ronald">
          <meta property="og:title" content="Build With Ronald — Systems, Software & Business">
          <meta property="og:description" content="Web platforms, automation tools, software systems, and digital experiences built by Ronald Hampton.">
          <meta property="og:url" content="https://buildwithronald.com/">
          <meta property="og:image" content="https://buildwithronald.com/assets/build-with-ronald-social.png?v=2">
          <meta property="og:image:secure_url" content="https://buildwithronald.com/assets/build-with-ronald-social.png?v=2">
          <meta property="og:image:type" content="image/png">
          <meta property="og:image:width" content="1200">
          <meta property="og:image:height" content="630">
          <meta property="og:image:alt" content="Build With Ronald logo and brand banner">
          <meta name="twitter:card" content="summary_large_image">
          <meta name="twitter:title" content="Build With Ronald — Systems, Software & Business">
          <meta name="twitter:description" content="Web platforms, automation tools, software systems, and digital experiences.">
          <meta name="twitter:image" content="https://buildwithronald.com/assets/build-with-ronald-social.png?v=2">'''
          if 'property="og:image"' not in text:
              text = text.replace(marker, tags, 1)
          else:
              import re
              text = re.sub(r'<meta property="og:image"[^>]*>', '<meta property="og:image" content="https://buildwithronald.com/assets/build-with-ronald-social.png?v=2">', text)
          p.write_text(text)
          PY

      - name: Commit generated preview
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html assets/build-with-ronald-social.svg assets/build-with-ronald-social.png assets/apple-touch-icon.png
          git commit -m "Add branded social link preview" || exit 0
          git push
