name: Fix scene orientation

on:
  push:
    paths:
      - '.github/workflows/fix-scene-orientation.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Correct car and camera orientation
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text()

          depth_hack = "car.add(spotL,spotR,targetL,targetR);car.traverse(obj=>{if(obj.isMesh){obj.renderOrder=100;if(obj.material){obj.material.depthTest=false;obj.material.depthWrite=false;}}});"
          text = text.replace(depth_hack, "car.add(spotL,spotR,targetL,targetR);")

          old_orientation = "car.position.copy(carVisualPos);car.lookAt(carVisualPos.clone().add(tangent));car.rotateY(driftAngle);car.rotation.z=drift.intensity*drift.dir*0.08;"
          new_orientation = "const roadUp=new THREE.Vector3(0,1,0),carRight=new THREE.Vector3().crossVectors(roadUp,tangent).normalize(),carBasis=new THREE.Matrix4().makeBasis(carRight,roadUp,tangent.clone().normalize());car.position.copy(carVisualPos);car.quaternion.setFromRotationMatrix(carBasis);car.rotateY(driftAngle);car.rotateZ(drift.intensity*drift.dir*0.08);"

          if old_orientation not in text and new_orientation not in text:
              raise SystemExit('Expected car orientation block was not found')
          text = text.replace(old_orientation, new_orientation, 1)

          old_camera = "desiredCameraPosition=carVisualPos.clone().addScaledVector(tangent,-followDistance).addScaledVector(right,workBlend*showcaseSideOffset).add(new THREE.Vector3(0,followHeight,0)),desiredCameraTarget="
          new_camera = "desiredCameraPosition=carVisualPos.clone().addScaledVector(tangent,-followDistance).addScaledVector(right,workBlend*showcaseSideOffset).add(new THREE.Vector3(0,followHeight,0));desiredCameraPosition.y=Math.max(desiredCameraPosition.y,carVisualPos.y+2.8);const desiredCameraTarget="

          if old_camera not in text and new_camera not in text:
              raise SystemExit('Expected camera position block was not found')
          text = text.replace(old_camera, new_camera, 1)

          path.write_text(text)
          print('Corrected upright car basis and above-road camera clamp')
          PY
      - name: Commit orientation fix
        run: |
          if git diff --quiet -- index.html; then
            echo 'No index change required'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Correct car and camera orientation above road'
          git push
