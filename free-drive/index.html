<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#08090c">
<title>Free Drive — Build With Ronald</title>
<style>
:root{--bg:#08090c;--panel:rgba(10,13,18,.78);--orange:#ff5a1f;--blue:#29c4ff;--text:#f2f4f7;--muted:#8b93a1;--line:#25303b}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;touch-action:none}canvas{display:block}
#game{position:fixed;inset:0}.topbar{position:fixed;top:max(14px,env(safe-area-inset-top));left:16px;right:16px;z-index:10;display:flex;align-items:center;justify-content:space-between;pointer-events:none}.brand{pointer-events:auto;display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);background:var(--panel);backdrop-filter:blur(12px);border-radius:12px;text-decoration:none;color:var(--text);font-weight:800;font-size:12px;letter-spacing:.08em}.brand b{color:var(--orange)}.brand span{color:var(--blue)}
.top-actions{display:flex;gap:8px;pointer-events:auto}.icon-btn{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:12px;min-width:46px;height:46px;padding:0 13px;font-weight:700;cursor:pointer;backdrop-filter:blur(12px)}
#hud{position:fixed;top:max(82px,calc(env(safe-area-inset-top) + 72px));left:16px;z-index:9;display:grid;grid-template-columns:repeat(2,minmax(105px,1fr));gap:8px;pointer-events:none}.stat{padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:var(--panel);backdrop-filter:blur(10px)}.label{display:block;color:var(--muted);font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:4px}.value{font-family:monospace;font-size:18px}.orange{color:var(--orange)}.blue{color:var(--blue)}
#message{position:fixed;left:50%;top:46%;transform:translate(-50%,-50%);z-index:8;width:min(520px,calc(100% - 34px));padding:22px;border:1px solid var(--line);border-radius:16px;background:rgba(8,9,12,.88);backdrop-filter:blur(16px);text-align:center;transition:.25s}.message-title{font-size:clamp(25px,7vw,42px);font-weight:900;margin:0 0 10px}.message-title span{color:var(--orange)}#message p{color:var(--muted);line-height:1.55;margin:0 0 18px}.start-btn{border:0;background:var(--orange);color:#090b0e;padding:14px 22px;border-radius:9px;font-weight:900;letter-spacing:.06em;text-transform:uppercase;cursor:pointer}.help{font-family:monospace;font-size:11px;color:var(--blue);margin-top:14px}.hidden{opacity:0;pointer-events:none}
#mobileControls{position:fixed;left:0;right:0;bottom:max(18px,env(safe-area-inset-bottom));z-index:12;display:none;justify-content:space-between;align-items:flex-end;padding:0 18px;pointer-events:none}.control-group{display:flex;gap:12px;pointer-events:auto}.control{width:68px;height:68px;border-radius:18px;border:1px solid #34404c;background:rgba(12,16,22,.82);color:white;font-size:25px;font-weight:900;backdrop-filter:blur(10px);user-select:none}.control.active{transform:scale(.95);border-color:var(--orange);box-shadow:0 0 22px rgba(255,90,31,.25)}.pedals{flex-direction:column}.pedals .control{width:74px;height:58px;font-size:12px;letter-spacing:.08em}.gas{border-color:rgba(41,196,255,.55)}.brake{border-color:rgba(255,90,31,.55)}
#tip{position:fixed;right:16px;bottom:16px;z-index:7;color:var(--muted);font:10px monospace;letter-spacing:.07em;pointer-events:none}
@media (max-width:820px),(pointer:coarse){#mobileControls{display:flex}#tip{display:none}#hud{grid-template-columns:repeat(2,105px)}.stat{padding:8px 10px}.value{font-size:16px}}
</style>
</head>
<body>
<div id="game"></div>
<div class="topbar">
  <a class="brand" href="/" aria-label="Return to portfolio"><b>BR</b> BUILD WITH <span>RONALD</span></a>
  <div class="top-actions"><button class="icon-btn" id="resetBtn">RESET</button><button class="icon-btn" id="exitBtn">EXIT</button></div>
</div>
<div id="hud">
  <div class="stat"><span class="label">Speed</span><span class="value orange" id="speed">0 MPH</span></div>
  <div class="stat"><span class="label">Distance</span><span class="value blue" id="distance">0.00 MI</span></div>
  <div class="stat"><span class="label">Drift</span><span class="value" id="drift">0</span></div>
  <div class="stat"><span class="label">Best</span><span class="value" id="best">0</span></div>
</div>
<div id="message">
  <h1 class="message-title">FREE <span>DRIVE</span></h1>
  <p>Drive the endless neon highway. Stay on the road, build speed, and hold the drift control while steering to score.</p>
  <button class="start-btn" id="startBtn">Start Engine</button>
  <div class="help">WASD / ARROWS · SPACE TO DRIFT · R TO RESET · ESC TO EXIT</div>
</div>
<div id="mobileControls">
  <div class="control-group"><button class="control" data-key="left">◀</button><button class="control" data-key="right">▶</button></div>
  <div class="control-group pedals"><button class="control gas" data-key="gas">GAS</button><button class="control brake" data-key="brake">BRAKE</button></div>
</div>
<div id="tip">WASD / ARROWS · SPACE DRIFT · R RESET · ESC EXIT</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const mount=document.getElementById('game');
const scene=new THREE.Scene();scene.background=new THREE.Color(0x05070a);scene.fog=new THREE.FogExp2(0x05070a,.012);
const camera=new THREE.PerspectiveCamera(58,innerWidth/innerHeight,.1,600);
const renderer=new THREE.WebGLRenderer({antialias:true});renderer.setSize(innerWidth,innerHeight);renderer.setPixelRatio(Math.min(devicePixelRatio,2));renderer.shadowMap.enabled=true;mount.appendChild(renderer.domElement);
scene.add(new THREE.HemisphereLight(0x5577aa,0x08090c,1.15));const moon=new THREE.DirectionalLight(0xb7d7ff,.8);moon.position.set(-10,25,10);scene.add(moon);
const starsGeo=new THREE.BufferGeometry(),stars=[];for(let i=0;i<1300;i++)stars.push((Math.random()-.5)*500,Math.random()*100+8,(Math.random()-.5)*600);starsGeo.setAttribute('position',new THREE.Float32BufferAttribute(stars,3));scene.add(new THREE.Points(starsGeo,new THREE.PointsMaterial({color:0x8fa4bb,size:.22,transparent:true,opacity:.7})));
const road=new THREE.Group();scene.add(road);const SEG=34,COUNT=24,ROAD_W=11;const roadMat=new THREE.MeshStandardMaterial({color:0x15191f,roughness:.98}),edgeMat=new THREE.MeshBasicMaterial({color:0x29c4ff}),lineMat=new THREE.MeshBasicMaterial({color:0xffb548});const segments=[];
function createSegment(i){const g=new THREE.Group();const slab=new THREE.Mesh(new THREE.BoxGeometry(ROAD_W,.22,SEG),roadMat);slab.receiveShadow=true;g.add(slab);[-ROAD_W/2,ROAD_W/2].forEach(x=>{const e=new THREE.Mesh(new THREE.BoxGeometry(.12,.04,SEG),edgeMat);e.position.set(x,.14,0);g.add(e)});const center=new THREE.Mesh(new THREE.BoxGeometry(.18,.05,SEG*.55),lineMat);center.position.y=.15;g.add(center);for(const side of[-1,1]){const post=new THREE.Mesh(new THREE.CylinderGeometry(.055,.07,2.6,6),new THREE.MeshStandardMaterial({color:0x222b35}));post.position.set(side*(ROAD_W/2+2),1.3,-SEG*.28);g.add(post);const bulb=new THREE.Mesh(new THREE.SphereGeometry(.14,8,8),new THREE.MeshBasicMaterial({color:side<0?0xff5a1f:0x29c4ff}));bulb.position.set(side*(ROAD_W/2+2),2.65,-SEG*.28);g.add(bulb)}g.position.z=-i*SEG;road.add(g);segments.push(g)}for(let i=0;i<COUNT;i++)createSegment(i);
const car=new THREE.Group();scene.add(car);const bodyMat=new THREE.MeshStandardMaterial({color:0x090b0f,metalness:.65,roughness:.3}),orange=new THREE.MeshStandardMaterial({color:0xff5a1f,metalness:.3,roughness:.45}),glass=new THREE.MeshStandardMaterial({color:0x071019,metalness:.25,roughness:.12});const body=new THREE.Mesh(new THREE.BoxGeometry(2.1,.62,4.3),bodyMat);body.position.y=.62;body.castShadow=true;car.add(body);const hood=new THREE.Mesh(new THREE.BoxGeometry(1.9,.35,1.2),bodyMat);hood.position.set(0,.5,2.25);car.add(hood);const stripe=new THREE.Mesh(new THREE.BoxGeometry(.45,.04,4),orange);stripe.position.set(0,.96,.12);car.add(stripe);const cab=new THREE.Mesh(new THREE.BoxGeometry(1.55,.58,1.8),glass);cab.position.set(0,1.18,-.25);car.add(cab);const wheels=[];function wheel(x,z){const w=new THREE.Mesh(new THREE.CylinderGeometry(.43,.43,.38,14),new THREE.MeshStandardMaterial({color:0x030303,roughness:1}));w.rotation.z=Math.PI/2;w.position.set(x,.43,z);car.add(w);wheels.push(w)}wheel(-1.08,1.35);wheel(1.08,1.35);wheel(-1.08,-1.35);wheel(1.08,-1.35);for(const x of[-.68,.68]){const h=new THREE.Mesh(new THREE.BoxGeometry(.32,.16,.08),new THREE.MeshBasicMaterial({color:0xfff2bd}));h.position.set(x,.62,2.86);car.add(h);const t=new THREE.Mesh(new THREE.BoxGeometry(.38,.15,.08),new THREE.MeshBasicMaterial({color:0xff3d32}));t.position.set(x,.62,-2.18);car.add(t)}
car.position.set(0,.1,5);camera.position.set(0,4.3,12.5);
const input={gas:false,brake:false,left:false,right:false,drift:false};let running=false,speed=0,heading=0,distance=0,driftScore=0,best=Number(localStorage.getItem('bwr-free-drive-best')||0),last=performance.now();document.getElementById('best').textContent=best;
function setKey(code,on){if(code==='ArrowUp'||code==='KeyW')input.gas=on;if(code==='ArrowDown'||code==='KeyS')input.brake=on;if(code==='ArrowLeft'||code==='KeyA')input.left=on;if(code==='ArrowRight'||code==='KeyD')input.right=on;if(code==='Space')input.drift=on}
addEventListener('keydown',e=>{setKey(e.code,true);if(e.code==='KeyR')reset();if(e.code==='Escape')location.href='/';if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))e.preventDefault()});addEventListener('keyup',e=>setKey(e.code,false));
document.querySelectorAll('.control').forEach(btn=>{const key=btn.dataset.key;const set=on=>{btn.classList.toggle('active',on);if(key==='gas')input.gas=on;if(key==='brake')input.brake=on;if(key==='left')input.left=on;if(key==='right')input.right=on;if((key==='left'||key==='right')&&on&&input.gas)input.drift=true;else if(key==='left'||key==='right')input.drift=false};btn.addEventListener('pointerdown',e=>{e.preventDefault();set(true)});['pointerup','pointercancel','pointerleave'].forEach(ev=>btn.addEventListener(ev,()=>set(false)))});
document.getElementById('startBtn').onclick=()=>{running=true;document.getElementById('message').classList.add('hidden')};document.getElementById('resetBtn').onclick=reset;document.getElementById('exitBtn').onclick=()=>location.href='/';
function reset(){speed=0;heading=0;distance=0;driftScore=0;car.position.set(0,.1,5);car.rotation.set(0,Math.PI,0);segments.forEach((s,i)=>{s.position.set(0,0,-i*SEG);s.rotation.y=0})}
function updateRoad(move){segments.forEach(s=>{s.position.z+=move;if(s.position.z>SEG){let min=Math.min(...segments.map(x=>x.position.z));s.position.z=min-SEG;const phase=Math.floor(Math.abs(s.position.z/SEG));s.position.x=Math.sin(phase*.62)*3.2;s.rotation.y=Math.sin(phase*.43)*.055}})}
function animate(now){requestAnimationFrame(animate);const dt=Math.min(.035,(now-last)/1000);last=now;if(running){const accel=input.gas?23:0,brake=input.brake?34:0;speed+=accel*dt;speed-=brake*dt;speed-=5.2*dt;speed=Math.max(input.brake?-9:0,Math.min(52,speed));const steer=(input.right?1:0)-(input.left?1:0),steerStrength=(.35+Math.abs(speed)/52*.9);heading+=steer*steerStrength*dt*(input.drift?1.65:1);heading*=Math.pow(.78,dt);car.position.x+=Math.sin(heading)*Math.abs(speed)*dt*.34;car.position.x*=Math.pow(.985,dt*60);car.position.x=Math.max(-10,Math.min(10,car.position.x));car.rotation.y=Math.PI-heading;car.rotation.z=steer*.08*(Math.abs(speed)/52);const move=speed*dt;updateRoad(move);distance+=Math.max(0,move)/1609.34;if(input.drift&&Math.abs(steer)>.1&&Math.abs(speed)>18){driftScore+=Math.round(Math.abs(speed)*dt*8);if(driftScore>best){best=driftScore;localStorage.setItem('bwr-free-drive-best',best)}}wheels.forEach(w=>w.rotateX(move/.43));const offRoad=Math.abs(car.position.x)>ROAD_W*.54;if(offRoad)speed-=18*dt;document.getElementById('speed').textContent=Math.round(Math.max(0,speed)*2.237)+' MPH';document.getElementById('distance').textContent=distance.toFixed(2)+' MI';document.getElementById('drift').textContent=driftScore;document.getElementById('best').textContent=best}
const target=new THREE.Vector3(car.position.x*.25,4.5,12.5);camera.position.lerp(target,.08);camera.lookAt(car.position.x*.18,1,-5);renderer.render(scene,camera)}animate(performance.now());addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight)});
</script>
</body>
</html>
